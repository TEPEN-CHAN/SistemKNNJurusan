<!DOCTYPE html>
<html lang="id">

<head>

    <meta charset="UTF-8">

    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>
        Sistem Rekomendasi Jurusan
    </title>

    <!-- =========================================
    BOOTSTRAP 5
    ========================================== -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
          rel="stylesheet">

    <!-- =========================================
    FONT AWESOME
    ========================================== -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- =========================================
    GOOGLE FONT
    ========================================== -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
          rel="stylesheet">

    <!-- =========================================
    CUSTOM CSS
    ========================================== -->
    <style>

        body{
            background: #f4f7fc;
            font-family: 'Poppins', sans-serif;
        }

        /* =========================================
        SIDEBAR
        ========================================== */

        .sidebar{
            width: 260px;
            height: 100vh;
            position: fixed;
            top: 0;
            left: 0;
            background: linear-gradient(
                180deg,
                #0d6efd,
                #0b5ed7
            );
            padding: 25px;
            color: white;
        }

        .sidebar h3{
            font-weight: 700;
            margin-bottom: 40px;
        }

        .sidebar a{
            display: block;
            color: white;
            text-decoration: none;
            padding: 14px 18px;
            margin-bottom: 12px;
            border-radius: 12px;
            transition: 0.3s;
            font-weight: 500;
        }

        .sidebar a:hover{
            background: rgba(255,255,255,0.15);
        }

        .sidebar i{
            margin-right: 10px;
        }

        /* =========================================
        CONTENT
        ========================================== */

        .main-content{
            margin-left: 260px;
            padding: 30px;
        }

        /* =========================================
        NAVBAR
        ========================================== */

        .topbar{
            background: white;
            padding: 20px 30px;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
            margin-bottom: 30px;
        }

        /* =========================================
        CARD
        ========================================== */

        .card{
            border: none;
            border-radius: 20px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.05);
        }

        /* =========================================
        RESPONSIVE
        ========================================== */

        @media(max-width:992px){

            .sidebar{
                width: 100%;
                height: auto;
                position: relative;
            }

            .main-content{
                margin-left: 0;
            }

        }

    </style>

</head>

<body>

<!-- =========================================
SIDEBAR
========================================== -->

<div class="sidebar">

    <h3>
        <i class="fa-solid fa-graduation-cap"></i>
        KNN Jurusan
    </h3>

    <a href="/dashboard_guru">
        <i class="fa-solid fa-house"></i>
        Dashboard
    </a>

    <a href="/input_nilai">
        <i class="fa-solid fa-file-excel"></i>
        Input Nilai Siswa
    </a>

    <a href="/input_alumni">
        <i class="fa-solid fa-database"></i>
        Input Data Alumni
    </a>

    <a href="/proses_knn">
        <i class="fa-solid fa-brain"></i>
        Proses KNN
    </a>

    <a href="/hasil_rekomendasi">
        <i class="fa-solid fa-chart-line"></i>
        Hasil Rekomendasi
    </a>

    <a href="/logout">
        <i class="fa-solid fa-right-from-bracket"></i>
        Logout
    </a>

</div>

<!-- =========================================
MAIN CONTENT
========================================== -->

<div class="main-content">

    <!-- TOPBAR -->
    <div class="topbar d-flex justify-content-between align-items-center">

        <div>

            <h4 class="fw-bold mb-0">
                Sistem Rekomendasi Jurusan
            </h4>

            <small class="text-muted">
                Metode K-Nearest Neighbor (KNN)
            </small>

        </div>

        <div>

            <i class="fa-solid fa-user-circle fa-2x text-primary"></i>

        </div>

    </div>

    <!-- CONTENT -->
    {% block content %}
    {% endblock %}

</div>

<!-- =========================================
BOOTSTRAP JS
========================================== -->

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
