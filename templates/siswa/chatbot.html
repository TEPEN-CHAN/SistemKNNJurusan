<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chatbot</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background: #f3f4f6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .chat-container {
            width: 100%;
            max-width: 380px;
            background: #ffffff;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            border-radius: 16px;
            overflow: hidden;
        }

        .chat-header {
            padding: 18px 20px;
            background: #2563eb;
            color: white;
            font-size: 1.1rem;
            font-weight: 600;
        }

        .chat-messages {
            padding: 16px;
            min-height: 360px;
            max-height: 360px;
            overflow-y: auto;
            background: #eef2ff;
        }

        .message {
            margin-bottom: 14px;
            display: flex;
        }

        .message.bot {
            justify-content: flex-start;
        }

        .message.user {
            justify-content: flex-end;
        }

        .message .bubble {
            max-width: 75%;
            padding: 12px 14px;
            border-radius: 18px;
            line-height: 1.5;
            white-space: pre-wrap;
        }

        .message.bot .bubble {
            background: #ffffff;
            color: #111827;
            border: 1px solid #d1d5db;
            border-top-left-radius: 4px;
        }

        .message.user .bubble {
            background: #2563eb;
            color: white;
            border-top-right-radius: 4px;
        }

        .chat-input {
            display: flex;
            gap: 10px;
            padding: 16px;
            background: #f8fafc;
            border-top: 1px solid #e5e7eb;
        }

        .chat-input input {
            flex: 1;
            padding: 12px 14px;
            border: 1px solid #cbd5e1;
            border-radius: 999px;
            outline: none;
            font-size: 0.95rem;
        }

        .chat-input button {
            padding: 12px 18px;
            border: none;
            border-radius: 999px;
            background: #2563eb;
            color: white;
            font-weight: 600;
            cursor: pointer;
        }

        .chat-input button:disabled {
            background: #93c5fd;
            cursor: default;
        }
    </style>
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">Chatbot Bantuan</div>
        <div class="chat-messages" id="chatMessages">
            <div class="message bot">
                <div class="bubble">Halo! Saya Chatbot. Silakan ketik pertanyaanmu.</div>
            </div>
        </div>
        <div class="chat-input">
            <input type="text" id="chatInput" placeholder="Tulis pesan..." autocomplete="off">
            <button id="sendButton">Kirim</button>
        </div>
    </div>

    <script>

        const chatMessages = document.getElementById('chatMessages');
        const chatInput = document.getElementById('chatInput');
        const sendButton = document.getElementById('sendButton');

        // =========================
        // DATA PERTANYAAN RIASEC
        // =========================

        const questions = [

            {
                text: "Apakah kamu suka memperbaiki mesin atau alat elektronik?",
                type: "REALISTIC"
            },

            {
                text: "Apakah kamu suka melakukan penelitian atau eksperimen?",
                type: "INVESTIGATIVE"
            },

            {
                text: "Apakah kamu suka menggambar atau desain?",
                type: "ARTISTIC"
            },

            {
                text: "Apakah kamu suka membantu orang lain?",
                type: "SOCIAL"
            },

            {
                text: "Apakah kamu suka memimpin organisasi?",
                type: "ENTERPRISING"
            },

            {
                text: "Apakah kamu suka pekerjaan administrasi dan data?",
                type: "CONVENTIONAL"
            }

        ];

        let currentQuestion = 0;

        let scores = {

            REALISTIC: 0,
            INVESTIGATIVE: 0,
            ARTISTIC: 0,
            SOCIAL: 0,
            ENTERPRISING: 0,
            CONVENTIONAL: 0

        };

        // =========================
        // TAMBAH CHAT
        // =========================

        function addMessage(text, sender) {

            const messageEl = document.createElement('div');

            messageEl.className = `message ${sender}`;

            const bubble = document.createElement('div');

            bubble.className = 'bubble';

            bubble.textContent = text;

            messageEl.appendChild(bubble);

            chatMessages.appendChild(messageEl);

            chatMessages.scrollTop = chatMessages.scrollHeight;
        }

        // =========================
        // MULAI CHATBOT
        // =========================

        function startQuestions() {

            addMessage(
                questions[currentQuestion].text +
                "\n\nJawab: suka / tidak",
                'bot'
            );
        }

        // =========================
        // KIRIM JAWABAN
        // =========================

        function handleSend() {

            const text = chatInput.value.trim().toLowerCase();

            if (!text) return;

            addMessage(text, 'user');

            chatInput.value = '';

            // =========================
            // SCORING
            // =========================

            if (text === 'suka') {

                scores[
                    questions[currentQuestion].type
                ] += 1;
            }

            currentQuestion++;

            // =========================
            // LANJUT PERTANYAAN
            // =========================

            if (currentQuestion < questions.length) {

                setTimeout(() => {

                    addMessage(
                        questions[currentQuestion].text +
                        "\n\nJawab: suka / tidak",
                        'bot'
                    );

                }, 500);

            }

            else {

                showResult();
            }
        }

        // =========================
        // HASIL AKHIR
        // =========================

        function showResult() {

            let highest = '';

            let highestScore = 0;

            for (let key in scores) {

                if (scores[key] > highestScore) {

                    highestScore = scores[key];
                    highest = key;
                }
            }

            // =========================
            // MAPEL
            // =========================

            let kelompok = '';

            let mapel = [];

            if (
                highest === 'INVESTIGATIVE' ||
                highest === 'ENTERPRISING' ||
                highest === 'CONVENTIONAL'
            ) {

                kelompok = 'Kelompok Mapel 1';

                mapel = [

                    'Matematika Tingkat Lanjut',
                    'Ekonomi',
                    'PKWu',
                    'Biologi',
                    'Fisika'

                ];

            }

            else {

                kelompok = 'Kelompok Mapel 2';

                mapel = [

                    'Biologi',
                    'Ekonomi',
                    'PKWu',
                    'Bahasa Inggris Tingkat Lanjut',
                    'Informatika'

                ];
            }

            // =========================
            // TAMPILKAN HASIL
            // =========================

            addMessage(

                "Hasil RIASEC Kamu:\n\n" +

                "Minat-Bakat: " + highest + "\n" +

                "Kelompok Mapel: " + kelompok + "\n\n" +

                "Rekomendasi Mapel:\n- " +

                mapel.join('\n- '),

                'bot'

            );

            // =========================
            // KIRIM KE FLASK
            // =========================

            fetch('/chatbot', {

                method: 'POST',

                headers: {
                    'Content-Type': 'application/json'
                },

                body: JSON.stringify({

                    minat_bakat: highest,
                    kelompok_mapel: kelompok

                })

            });
        }

        // =========================
        // EVENT
        // =========================

        sendButton.addEventListener('click', handleSend);

        chatInput.addEventListener('keydown', (event) => {

            if (event.key === 'Enter') {

                handleSend();
            }
        });

        // START

        startQuestions();

    </script>
</body>
</html>
