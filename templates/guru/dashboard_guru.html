{% extends 'layout/base.html' %}

{% block content %}

<style>

    .topbar{

        background:white;

        border-radius:20px;

        padding:20px 30px;

        display:flex;
        justify-content:space-between;
        align-items:center;

        margin-bottom:30px;

        box-shadow:
        0 5px 15px rgba(0,0,0,0.05);
    }

    .welcome-title{

        font-size:38px;
        font-weight:700;

        color:#0f172a;
    }

    .welcome-subtitle{

        color:#64748b;

        font-size:16px;
    }

    .profile-box{

        display:flex;
        align-items:center;
    }

    .profile-circle{

        width:55px;
        height:55px;

        border-radius:50%;

        background:#2563eb;

        color:white;

        display:flex;
        justify-content:center;
        align-items:center;

        font-size:24px;

        margin-right:15px;
    }

    .profile-name{

        font-weight:600;
        color:#0f172a;
    }

    .profile-role{

        font-size:14px;
        color:#64748b;
    }

    .stats-card{

        background:white;

        border-radius:22px;

        padding:25px;

        box-shadow:
        0 5px 15px rgba(0,0,0,0.05);

        transition:0.3s;
    }

    .stats-card:hover{

        transform:translateY(-5px);
    }

    .stats-icon{

        width:70px;
        height:70px;

        border-radius:20px;

        display:flex;
        justify-content:center;
        align-items:center;

        color:white;

        font-size:30px;

        margin-bottom:20px;
    }

    .blue{
        background:#2563eb;
    }

    .green{
        background:#16a34a;
    }

    .purple{
        background:#7c3aed;
    }

    .orange{
        background:#f97316;
    }

</style>

<div class="topbar">

    <div>

        <div class="welcome-title">
            Selamat Datang, Guru BK 👋
        </div>

        <div class="welcome-subtitle">
            Kelola data siswa dan proses rekomendasi jurusan dengan mudah.
        </div>

    </div>

    <div class="profile-box">

        <div class="profile-circle">
            <i class="bi bi-person-fill"></i>
        </div>

        <div>

            <div class="profile-name">
                {{ session['username'] }}
            </div>

            <div class="profile-role">
                Guru BK
            </div>

        </div>

    </div>

</div>

{% endblock %}
