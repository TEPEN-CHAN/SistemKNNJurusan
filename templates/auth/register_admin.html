<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Register Admin</title>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        *{
            font-family:'Poppins', sans-serif;
        }

        body{

            margin:0;
            padding:0;

            min-height:100vh;

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #1e3a8a,
                #2563eb
            );

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .register-container{

            width:100%;
            max-width:500px;

            background:white;

            padding:40px;

            border-radius:25px;

            box-shadow:
            0 15px 40px rgba(0,0,0,0.2);
        }

        .logo-box{

            width:90px;
            height:90px;

            margin:auto;

            border-radius:50%;

            background:
            linear-gradient(
                135deg,
                #2563eb,
                #1d4ed8
            );

            display:flex;
            justify-content:center;
            align-items:center;

            color:white;

            font-size:35px;
            font-weight:bold;

            margin-bottom:20px;
        }

        .title{

            text-align:center;

            font-size:28px;
            font-weight:700;

            color:#0f172a;
        }

        .subtitle{

            text-align:center;

            color:#64748b;

            margin-bottom:30px;
        }

        .form-control{

            height:52px;

            border-radius:14px;

            border:1px solid #cbd5e1;
        }

        .form-control:focus{

            border-color:#2563eb;

            box-shadow:
            0 0 0 0.2rem rgba(37,99,235,0.2);
        }

        .btn-register{

            width:100%;
            height:52px;

            border:none;

            border-radius:14px;

            background:
            linear-gradient(
                135deg,
                #2563eb,
                #1d4ed8
            );

            color:white;

            font-weight:600;
        }

        .btn-register:hover{

            opacity:0.9;
        }

        .bottom-text{

            text-align:center;

            margin-top:20px;

            font-size:14px;
        }

        .bottom-text a{

            text-decoration:none;

            color:#2563eb;

            font-weight:600;
        }

    </style>

</head>

<body>

    <div class="register-container">

        <div class="logo-box">
            A
        </div>

        <h2 class="title">
            Register Admin
        </h2>

        <p class="subtitle">
            Buat akun administrator sistem
        </p>

        <!-- ERROR -->
        {% if error %}

        <div class="alert alert-danger">

            {{ error }}

        </div>

        {% endif %}

        <!-- FORM -->
        <form method="POST">

            <div class="mb-3">

                <label class="form-label">
                    Nama Admin
                </label>

                <input
                    type="text"
                    name="nama"
                    class="form-control"
                    placeholder="Masukkan nama admin"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Email
                </label>

                <input
                    type="email"
                    name="email"
                    class="form-control"
                    placeholder="Masukkan email"
                    required
                >

            </div>

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Masukkan username"
                    required
                >

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Masukkan password"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn btn-register"
            >
                Register Admin
            </button>

        </form>

        <div class="bottom-text">

            Sudah punya akun?

            <a href="{{ url_for('home') }}">
                Login
            </a>

        </div>

    </div>

</body>
</html>
