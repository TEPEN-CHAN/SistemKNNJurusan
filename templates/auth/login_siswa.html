<!DOCTYPE html>
<html lang="id">
<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login Siswa</title>

    <!-- Bootstrap 5 -->
    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet"
    >

    <!-- Google Font -->
    <link
        href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet"
    >

    <style>

        *{
            font-family:'Poppins', sans-serif;
        }

        body{

            margin:0;
            padding:0;

            min-height:100vh;

            background:
            linear-gradient(
                135deg,
                #0f172a,
                #1e3a8a,
                #2563eb
            );

            display:flex;
            justify-content:center;
            align-items:center;
        }

        .login-card{

            width:100%;
            max-width:450px;

            background:white;

            border-radius:30px;

            padding:45px;

            box-shadow:
            0 20px 40px rgba(0,0,0,0.2);

            animation:fadeIn 0.5s ease;
        }

        .logo-box{

            width:90px;
            height:90px;

            margin:auto;

            border-radius:50%;

            background:
            linear-gradient(
                135deg,
                #2563eb,
                #1d4ed8
            );

            color:white;

            display:flex;
            justify-content:center;
            align-items:center;

            font-size:35px;
            font-weight:700;

            margin-bottom:25px;
        }

        .title{

            text-align:center;

            font-size:30px;
            font-weight:700;

            color:#0f172a;

            margin-bottom:10px;
        }

        .subtitle{

            text-align:center;

            color:#64748b;

            margin-bottom:35px;
        }

        .form-label{

            font-weight:600;

            color:#334155;
        }

        .form-control{

            height:55px;

            border-radius:15px;

            border:1px solid #cbd5e1;

            padding-left:15px;
        }

        .form-control:focus{

            border-color:#2563eb;

            box-shadow:
            0 0 0 0.2rem rgba(37,99,235,0.2);
        }

        .btn-login{

            width:100%;
            height:55px;

            border:none;

            border-radius:15px;

            background:
            linear-gradient(
                135deg,
                #2563eb,
                #1d4ed8
            );

            color:white;

            font-size:16px;
            font-weight:600;

            transition:0.3s;
        }

        .btn-login:hover{

            transform:translateY(-2px);

            box-shadow:
            0 10px 20px rgba(37,99,235,0.3);
        }

        .bottom-text{

            text-align:center;

            margin-top:25px;

            color:#64748b;
        }

        .bottom-text a{

            text-decoration:none;

            color:#2563eb;

            font-weight:600;
        }

        @keyframes fadeIn{

            from{
                opacity:0;
                transform:translateY(20px);
            }

            to{
                opacity:1;
                transform:translateY(0);
            }
        }

    </style>

</head>

<body>

    <div class="login-card">

        <div class="logo-box">
            S
        </div>

        <h2 class="title">
            Login Siswa
        </h2>

        <p class="subtitle">
            Silakan login untuk melanjutkan
        </p>

        {% if error %}

        <div class="alert alert-danger">
            {{ error }}
        </div>

        {% endif %}

        <form
            method="POST"
            action="{{ url_for('proses_login_siswa') }}"
        >

            <div class="mb-3">

                <label class="form-label">
                    Username
                </label>

                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Masukkan username"
                    required
                >

            </div>

            <div class="mb-4">

                <label class="form-label">
                    Password
                </label>

                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Masukkan password"
                    required
                >

            </div>

            <button
                type="submit"
                class="btn btn-login"
            >
                Login Siswa
            </button>

        </form>

        <div class="bottom-text">

            Belum punya akun?

            <a href="{{ url_for('register_siswa') }}">
                Register Siswa
            </a>

        </div>

    </div>

</body>
</html>
